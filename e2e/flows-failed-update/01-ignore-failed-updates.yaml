appId: ${APP_ID}
---
- launchApp
- assertVisible: "React Native.*"
- assertVisible: "(?i)sync retry failed update"

# 1) Download broken optional update with default ignoreFailedUpdates=true
- tapOn: "Check for updates"
- waitForAnimationToEnd:
    timeout: 30000
- assertVisible: "Result: UPDATE_INSTALLED"

# Restart to run broken update -> expected rollback to previous/binary bundle
- tapOn: "Restart app"
- waitForAnimationToEnd:
    timeout: 15000
- launchApp:
    stopApp: false
- waitForAnimationToEnd:
    timeout: 30000
- assertVisible: "React Native.*"
- tapOn: "Get update metadata"
- waitForAnimationToEnd:
    timeout: 3000
# METADATA_V1.2.1 = intentionally broken release version marker
- assertNotVisible: "METADATA_V1.2.1"

# 2) Default sync should ignore previously failed update
- tapOn: "Check for updates"
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: "Result: UP_TO_DATE"

# 3) Explicit retry with ignoreFailedUpdates=false should try the failed update again
- assertVisible: "(?i)sync retry failed update"
- tapOn: "(?i)sync retry failed update"
- waitForAnimationToEnd:
    timeout: 30000
- assertVisible: "Result: UPDATE_INSTALLED"

# Restart to run failed update again -> should rollback again and stay off failed label
- tapOn: "Restart app"
- waitForAnimationToEnd:
    timeout: 15000
- launchApp:
    stopApp: false
- waitForAnimationToEnd:
    timeout: 30000
- assertVisible: "React Native.*"
- tapOn: "Get update metadata"
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible: "METADATA_V1.2.1"
