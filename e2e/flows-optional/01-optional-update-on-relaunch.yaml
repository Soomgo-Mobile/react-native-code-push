appId: ${APP_ID}
---
- launchApp
- assertVisible: "React Native.*"

# Ensure binary state before scenario
- tapOn: "Clear updates"
- tapOn: "Restart app"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: "React Native.*"
- assertNotVisible: "UPDATED!"

# Download optional update (default install mode: ON_NEXT_RESTART)
- tapOn: "Check for updates"
- waitForAnimationToEnd:
    timeout: 30000
- assertVisible: "Result: UPDATE_INSTALLED"
- assertNotVisible: "UPDATED!"

# App relaunch should apply the downloaded update
- stopApp
- launchApp:
    stopApp: false
- assertVisible: "React Native.*"
- assertVisible: "UPDATED!"

- tapOn: "Get update metadata"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "METADATA_V1.1.1"
