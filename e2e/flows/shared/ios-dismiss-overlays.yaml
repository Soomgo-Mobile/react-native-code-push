appId: ${APP_ID}
---
# Dismiss common iOS system prompts that can cover the app right after launch in CI.
- runFlow:
    when:
      visible: "(?i)^(allow|ok|continue|not now|allow once|allow while using app|allow paste|relaunch|close|try again)$"
    commands:
      - tapOn: "(?i)^(allow|ok|continue|not now|allow once|allow while using app|allow paste|relaunch|close|try again)$"
- runFlow:
    when:
      visible: "(?i)^(allow|ok|continue|not now|allow once|allow while using app|allow paste|relaunch|close|try again)$"
    commands:
      - tapOn: "(?i)^(allow|ok|continue|not now|allow once|allow while using app|allow paste|relaunch|close|try again)$"
