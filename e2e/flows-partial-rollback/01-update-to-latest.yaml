appId: ${APP_ID}
---
# Force binary baseline so this flow is retry-safe
- launchApp
- tapOn: "Clear updates"
- tapOn: "Restart app"
- waitForAnimationToEnd:
    timeout: 15000

# App should be on binary (after clear + restart)
- assertVisible: "React Native.*"
- assertNotVisible: "UPDATED!"

# Sync — should update to 1.0.2 (latest enabled)
- tapOn: "Check for updates"
- waitForAnimationToEnd:
    timeout: 30000
- assertVisible: "UPDATED!"

# Verify running version is 1.0.2
- tapOn: "Get update metadata"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "METADATA_V1.0.2"
